<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glow Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh;font-family:'Nunito',system-ui,sans-serif;color:#1f1147}
  body{
    background:
      radial-gradient(900px 600px at 10% -10%, #ffd6f0 0%, transparent 60%),
      radial-gradient(900px 700px at 95% 0%, #d6f0ff 0%, transparent 55%),
      radial-gradient(800px 600px at 50% 110%, #fff3c4 0%, transparent 55%),
      #fff8ee;
    overflow-x:hidden;
  }
  body.dark{
    color:#fefaf2;
    background:
      radial-gradient(900px 600px at 10% -10%, #4b1b6b 0%, transparent 60%),
      radial-gradient(900px 700px at 95% 0%, #0a3a6b 0%, transparent 55%),
      radial-gradient(800px 600px at 50% 110%, #2a1f47 0%, transparent 55%),
      #14102a;
  }
  /* floating doodles */
  .bg-doodle{position:fixed;pointer-events:none;opacity:.55;animation:float 9s ease-in-out infinite}
  body.dark .bg-doodle{opacity:.18}
  @keyframes float{0%,100%{transform:translateY(0) rotate(var(--r,0deg))}50%{transform:translateY(-18px) rotate(calc(var(--r,0deg) + 6deg))}}
  #root{position:relative;z-index:1}
  /* number flip pop */
  @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.22)}100%{transform:scale(1)}}
  .pop{animation:pop .42s cubic-bezier(.2,1.6,.4,1)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .shake{animation:shake .3s ease}
  /* confetti */
  .confetti{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform,opacity;pointer-events:none}
  @keyframes burst{
    0%{transform:translate(-50%,-50%) rotate(0) scale(.6);opacity:1}
    100%{transform:translate(var(--tx),var(--ty)) rotate(var(--tr));opacity:0}
  }
  /* slider */
  .pts-slider{appearance:none;-webkit-appearance:none;width:100%;height:18px;border-radius:999px;outline:none;
    background:linear-gradient(90deg, var(--c1) var(--p,50%), rgba(255,255,255,.7) var(--p,50%));
    box-shadow:inset 0 2px 6px rgba(0,0,0,.18), 0 0 0 3px rgba(255,255,255,.7);
    cursor:grab;
  }
  body.dark .pts-slider{box-shadow:inset 0 2px 6px rgba(0,0,0,.4), 0 0 0 3px rgba(255,255,255,.12);
    background:linear-gradient(90deg, var(--c1) var(--p,50%), rgba(255,255,255,.08) var(--p,50%));}
  .pts-slider:active{cursor:grabbing}
  .pts-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;border-radius:50%;
    background:#fff;border:4px solid var(--c1);box-shadow:0 6px 14px rgba(0,0,0,.25);cursor:grab}
  .pts-slider::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:#fff;border:4px solid var(--c1);box-shadow:0 6px 14px rgba(0,0,0,.25);cursor:grab}

  .btn-tactile{transition:transform .08s ease, box-shadow .08s ease;cursor:pointer;user-select:none}
  .btn-tactile:active{transform:translateY(3px) scale(.96)}

  .num-input{font-family:'Fredoka',sans-serif;font-weight:700;background:transparent;border:none;outline:none;
    text-align:center;color:inherit;width:100%;font-variant-numeric:tabular-nums}
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .num-input{-moz-appearance:textfield}

  @keyframes crown-wiggle{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
  .crown{animation:crown-wiggle 1.6s ease-in-out infinite;transform-origin:center bottom}

  /* card entry */
  @keyframes cardIn{from{opacity:0;transform:translateY(20px) scale(.95)}to{opacity:1;transform:none}}
  .card-in{animation:cardIn .35s cubic-bezier(.2,1.2,.4,1) both}

  /* title bounce */
  @keyframes bounce-letter{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  .bounce span{display:inline-block;animation:bounce-letter 2.6s ease-in-out infinite}

  /* trophy glow */
  .leader-glow{box-shadow:0 0 0 4px #fff, 0 0 0 8px var(--c1), 0 18px 40px rgba(0,0,0,.18), 0 0 60px var(--c1)}
  body.dark .leader-glow{box-shadow:0 0 0 4px rgba(255,255,255,.08), 0 0 0 8px var(--c1), 0 18px 40px rgba(0,0,0,.5), 0 0 60px var(--c1)}

  /* layout */
  .wrap{max-width:1500px;margin:0 auto;padding:24px 24px 80px;min-height:100vh;display:flex;flex-direction:column}
  .grid-center{flex:1;display:flex;align-items:center;justify-content:center}
  .grid-center > .grid{width:100%}
  .top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
  .brand{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(36px,5vw,64px);letter-spacing:-.02em;line-height:.95}
  .brand .sub{display:block;font-family:'Nunito';font-weight:700;font-size:14px;letter-spacing:.18em;text-transform:uppercase;color:#7a6aa3;margin-bottom:6px}
  body.dark .brand .sub{color:#b8a8e8}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:999px;font-weight:800;font-size:14px;
    background:#fff;color:#1f1147;border:none;box-shadow:0 4px 0 rgba(0,0,0,.08), 0 8px 18px rgba(0,0,0,.06)}
  body.dark .pill{background:#251a47;color:#fefaf2;box-shadow:0 4px 0 rgba(0,0,0,.4), 0 8px 18px rgba(0,0,0,.4)}
  .pill.primary{background:#1f1147;color:#fff}
  body.dark .pill.primary{background:#ffd84d;color:#1f1147}

  .grid{display:grid;gap:22px;grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}

  .card{position:relative;border-radius:28px;padding:20px 20px 18px;background:#fff;
    box-shadow:0 6px 0 rgba(0,0,0,.06), 0 14px 30px rgba(0,0,0,.08);overflow:hidden}
  body.dark .card{background:#1e1640;box-shadow:0 6px 0 rgba(0,0,0,.3), 0 14px 30px rgba(0,0,0,.4)}

  .card .accent{position:absolute;inset:0;background:var(--c1);opacity:.14;pointer-events:none}
  body.dark .card .accent{opacity:.2}

  .row{display:flex;align-items:center;gap:12px}

  .emoji{font-size:38px;line-height:1;filter:drop-shadow(0 2px 0 rgba(0,0,0,.08))}

  .team-name{font-family:'Fredoka';font-weight:700;font-size:26px;line-height:1;background:transparent;border:none;outline:none;color:inherit;width:100%;padding:4px 6px;border-radius:8px}
  .team-name:focus{background:rgba(0,0,0,.06)}
  body.dark .team-name:focus{background:rgba(255,255,255,.08)}

  .score-big{font-family:'Fredoka';font-weight:700;font-size:clamp(72px,9vw,120px);line-height:1;letter-spacing:-.04em;
    color:var(--c1);text-shadow:3px 3px 0 rgba(0,0,0,.06);display:flex;justify-content:center;align-items:center}
  body.dark .score-big{text-shadow:3px 3px 0 rgba(0,0,0,.3)}

  .delta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
  .deltaBtn{font-family:'Fredoka';font-weight:600;font-size:22px;padding:14px 0;border-radius:18px;border:none;
    background:#fff;color:var(--c1);box-shadow:0 4px 0 rgba(0,0,0,.08), inset 0 0 0 3px var(--c1)}
  body.dark .deltaBtn{background:#16102e}
  .deltaBtn.minus{color:#c81d57;box-shadow:0 4px 0 rgba(0,0,0,.08), inset 0 0 0 3px #c81d57}
  .deltaBtn.plus{color:#fff;background:var(--c1);box-shadow:0 4px 0 rgba(0,0,0,.18)}
  .deltaBtn.big{font-size:30px;padding:18px 0}

  .stepper{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;margin-top:14px;
    padding:8px;border-radius:18px;background:rgba(0,0,0,.04)}
  body.dark .stepper{background:rgba(255,255,255,.05)}
  .stepBtn{width:42px;height:42px;border-radius:14px;border:none;font-size:24px;font-weight:800;line-height:1;
    background:#fff;color:var(--c1);box-shadow:0 3px 0 rgba(0,0,0,.08)}
  body.dark .stepBtn{background:#231854}
  .stepBtn.minus{color:#c81d57}

  .slider-wrap{margin-top:14px}
  .slider-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:rgba(0,0,0,.45);margin-top:6px;letter-spacing:.06em}
  body.dark .slider-labels{color:rgba(255,255,255,.5)}

  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
  .iconBtn{appearance:none;border:none;background:transparent;color:rgba(0,0,0,.4);cursor:pointer;padding:6px 8px;border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.08em}
  body.dark .iconBtn{color:rgba(255,255,255,.45)}
  .iconBtn:hover{background:rgba(0,0,0,.05);color:rgba(0,0,0,.7)}
  body.dark .iconBtn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}

  .ribbon{position:absolute;top:14px;right:-46px;transform:rotate(35deg);background:var(--c1);color:#fff;padding:4px 50px;font-weight:900;font-size:11px;letter-spacing:.18em;box-shadow:0 4px 12px rgba(0,0,0,.2)}

  .menu-wrap{position:relative}
  .menu-btn{display:inline-flex;align-items:center;gap:10px}
  .menu-bars{display:inline-flex;flex-direction:column;gap:3px}
  .menu-bars i{display:block;width:18px;height:2.5px;border-radius:2px;background:currentColor;transition:transform .18s, opacity .18s}
  .menu-btn.open .menu-bars i:nth-child(1){transform:translateY(5.5px) rotate(45deg)}
  .menu-btn.open .menu-bars i:nth-child(2){opacity:0}
  .menu-btn.open .menu-bars i:nth-child(3){transform:translateY(-5.5px) rotate(-45deg)}
  .menu-pop{position:absolute;top:calc(100% + 10px);right:0;min-width:240px;background:#fff;border-radius:18px;
    box-shadow:0 14px 40px rgba(0,0,0,.18), 0 4px 0 rgba(0,0,0,.05);padding:8px;z-index:30;
    animation:menuIn .18s cubic-bezier(.2,1.2,.4,1) both}
  body.dark .menu-pop{background:#1e1640}
  @keyframes menuIn{from{opacity:0;transform:translateY(-6px) scale(.96)}to{opacity:1;transform:none}}
  .menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;background:transparent;
    border-radius:12px;font-family:'Nunito';font-weight:700;font-size:15px;color:inherit;cursor:pointer;text-align:left}
  .menu-item:hover{background:rgba(0,0,0,.06)}
  body.dark .menu-item:hover{background:rgba(255,255,255,.08)}
  .menu-icon{font-size:18px;width:22px;text-align:center}
  .menu-right{margin-left:auto;color:#22c55e;font-weight:900}
  .menu-sep{height:1px;background:rgba(0,0,0,.08);margin:6px 8px}
  body.dark .menu-sep{background:rgba(255,255,255,.1)}

  .leaderboard{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:#1f1147;color:#fff;padding:10px 18px;border-radius:999px;display:flex;gap:14px;align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.25);font-weight:800;font-size:14px;z-index:10}
  body.dark .leaderboard{background:#ffd84d;color:#1f1147}
  .lb-dot{width:10px;height:10px;border-radius:50%;background:var(--c1)}
  .lb-name{margin-right:6px}

  /* color picker for team */
  .color-pop{position:absolute;top:48px;right:14px;display:none;gap:6px;padding:8px;border-radius:14px;background:#fff;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:5}
  body.dark .color-pop{background:#2a1d59}
  .color-pop.open{display:flex}
  .color-pop button{width:24px;height:24px;border-radius:50%;border:2px solid #fff;cursor:pointer;padding:0}
  body.dark .color-pop button{border-color:#1e1640}

  /* fireworks bar */
  .top-celebration{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}

  /* modal */
  .modal-back{position:fixed;inset:0;background:rgba(15,8,40,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:28px;padding:28px;max-width:420px;width:90%;text-align:center;box-shadow:0 30px 60px rgba(0,0,0,.3)}
  body.dark .modal{background:#1e1640;color:#fff}
  .modal h2{font-family:'Fredoka';font-size:32px;margin:0 0 8px}
  .modal p{margin:0 0 18px;color:rgba(0,0,0,.6)}
  body.dark .modal p{color:rgba(255,255,255,.7)}
  .modal .actions{display:flex;gap:10px;justify-content:center}
  .modal .actions button{font-family:'Fredoka';font-weight:600;font-size:18px;padding:12px 22px;border-radius:14px;border:none;cursor:pointer}
  .modal .cancel{background:rgba(0,0,0,.06);color:inherit}
  body.dark .modal .cancel{background:rgba(255,255,255,.08)}
  .modal .confirm{background:#c81d57;color:#fff}

  @media (max-width:560px){
    .wrap{padding:14px 12px 90px}
    .grid{gap:16px}
    .card{padding:16px 16px 14px;border-radius:24px}
    .score-big{font-size:84px}
    .emoji{font-size:32px}
    .toolbar .pill{font-size:13px;padding:8px 12px}
  }
</style>
</head>
<body>
  <!-- background doodles -->
  <svg class="bg-doodle" style="top:8%;left:4%;width:80px;--r:-12deg;animation-delay:0s" viewBox="0 0 100 100"><polygon points="50,5 61,38 96,38 68,58 78,92 50,72 22,92 32,58 4,38 39,38" fill="#ffd84d"/></svg>
  <svg class="bg-doodle" style="top:18%;right:6%;width:70px;--r:18deg;animation-delay:1.2s" viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#ff7eb6"/><circle cx="50" cy="50" r="28" fill="#fff"/><circle cx="50" cy="50" r="14" fill="#ff7eb6"/></svg>
  <svg class="bg-doodle" style="bottom:14%;left:8%;width:90px;--r:8deg;animation-delay:2.4s" viewBox="0 0 100 100"><path d="M50 12c8 18 22 22 38 22-16 6-26 20-38 38-12-18-22-32-38-38 16 0 30-4 38-22z" fill="#7be1ff"/></svg>
  <svg class="bg-doodle" style="bottom:8%;right:10%;width:64px;--r:-22deg;animation-delay:.6s" viewBox="0 0 100 100"><rect x="20" y="20" width="60" height="60" rx="14" fill="#9cf0a2" transform="rotate(20 50 50)"/></svg>
  <svg class="bg-doodle" style="top:50%;left:2%;width:48px;--r:30deg;animation-delay:1.8s" viewBox="0 0 100 100"><polygon points="50,10 90,50 50,90 10,50" fill="#c39bff"/></svg>

  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
