<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Glow Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100vh;font-family:'Nunito',system-ui,sans-serif;color:#1f1147}
  body{background:#f5f4f0;overflow-x:hidden}
  body.dark{color:#fefaf2;background:#111827}
  #root{position:relative;z-index:1}
  /* number flip pop */
  @keyframes pop{0%{transform:scale(1)}30%{transform:scale(1.22)}100%{transform:scale(1)}}
  .pop{animation:pop .42s cubic-bezier(.2,1.6,.4,1)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .shake{animation:shake .3s ease}
  /* confetti */
  .confetti{position:absolute;width:10px;height:14px;border-radius:2px;will-change:transform,opacity;pointer-events:none}
  @keyframes burst{
    0%{transform:translate(-50%,-50%) rotate(0) scale(.6);opacity:1}
    100%{transform:translate(var(--tx),var(--ty)) rotate(var(--tr));opacity:0}
  }
  /* slider */
  .pts-slider{appearance:none;-webkit-appearance:none;width:100%;height:18px;border-radius:999px;outline:none;
    background:linear-gradient(90deg, var(--c1) var(--p,50%), rgba(255,255,255,.7) var(--p,50%));
    box-shadow:inset 0 2px 6px rgba(0,0,0,.18), 0 0 0 3px rgba(255,255,255,.7);
    cursor:grab;
  }
  body.dark .pts-slider{box-shadow:inset 0 2px 6px rgba(0,0,0,.4), 0 0 0 3px rgba(255,255,255,.12);
    background:linear-gradient(90deg, var(--c1) var(--p,50%), rgba(255,255,255,.08) var(--p,50%));}
  .pts-slider:active{cursor:grabbing}
  .pts-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:34px;height:34px;border-radius:50%;
    background:#fff;border:4px solid var(--c1);box-shadow:0 6px 14px rgba(0,0,0,.25);cursor:grab}
  .pts-slider::-moz-range-thumb{width:34px;height:34px;border-radius:50%;background:#fff;border:4px solid var(--c1);box-shadow:0 6px 14px rgba(0,0,0,.25);cursor:grab}

  .btn-tactile{transition:transform .08s ease, box-shadow .08s ease;cursor:pointer;user-select:none}
  .btn-tactile:active{transform:translateY(3px) scale(.96)}

  .num-input{font-family:'Fredoka',sans-serif;font-weight:700;background:transparent;border:none;outline:none;
    text-align:center;color:inherit;width:100%;font-variant-numeric:tabular-nums}
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .num-input{-moz-appearance:textfield}

  /* leader highlight — left bar instead of outer glow */
  .leader-glow{border-left:5px solid var(--c1) !important}
  body.dark .leader-glow{border-left:5px solid var(--c1) !important}

  /* layout */
  .wrap{max-width:1400px;margin:0 auto;padding:24px 24px 80px;min-height:100vh;display:flex;flex-direction:column}
  .grid-center{flex:1;display:flex;align-items:center;justify-content:center}
  .grid-center > .grid{width:100%}
  .top-bar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .brand{font-family:'Fredoka',sans-serif;font-weight:700;font-size:clamp(28px,4vw,48px);letter-spacing:-.01em;line-height:1;color:#1a1a2e}
  body.dark .brand{color:#fefaf2}
  .brand .sub{display:block;font-family:'Nunito';font-weight:700;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#888;margin-bottom:4px}
  .toolbar{display:flex;gap:10px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;font-weight:700;font-size:14px;
    background:#fff;color:#1a1a2e;border:none;box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
  body.dark .pill{background:#1f2937;color:#fefaf2;box-shadow:0 1px 3px rgba(0,0,0,.4)}
  .pill.primary{background:#1a1a2e;color:#fff}
  body.dark .pill.primary{background:#f9fafb;color:#1a1a2e}

  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}

  .card{position:relative;border-radius:16px;padding:20px 20px 16px;background:#fff;
    box-shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);border-left:4px solid transparent}
  body.dark .card{background:#1f2937;box-shadow:0 1px 3px rgba(0,0,0,.3)}

  .card .accent{display:none}

  .row{display:flex;align-items:center;gap:12px}

  .emoji{font-size:38px;line-height:1;filter:drop-shadow(0 2px 0 rgba(0,0,0,.08))}

  .team-name{font-family:'Fredoka';font-weight:700;font-size:26px;line-height:1;background:transparent;border:none;outline:none;color:inherit;width:100%;padding:4px 6px;border-radius:8px}
  .team-name:focus{background:rgba(0,0,0,.06)}
  body.dark .team-name:focus{background:rgba(255,255,255,.08)}

  .score-big{font-family:'Fredoka';font-weight:700;font-size:clamp(64px,8vw,108px);line-height:1;letter-spacing:-.03em;
    color:var(--c1);display:block;width:100%;text-align:center}

  .delta-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
  .deltaBtn{font-family:'Fredoka';font-weight:600;font-size:20px;padding:12px 0;border-radius:10px;border:none;
    background:#f3f4f6;color:var(--c1)}
  body.dark .deltaBtn{background:#374151;color:var(--c1)}
  .deltaBtn.minus{color:#e11d48;background:#fef2f2}
  body.dark .deltaBtn.minus{background:#3b1a24}
  .deltaBtn.plus{color:#fff;background:var(--c1)}
  .deltaBtn.big{font-size:26px;padding:16px 0}

  .stepper{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;margin-top:12px;
    padding:8px;border-radius:10px;background:#f3f4f6}
  body.dark .stepper{background:#374151}
  .stepBtn{width:38px;height:38px;border-radius:8px;border:none;font-size:22px;font-weight:700;line-height:1;
    background:#fff;color:var(--c1);box-shadow:0 1px 2px rgba(0,0,0,.08)}
  body.dark .stepBtn{background:#4b5563}
  .stepBtn.minus{color:#e11d48}

  .slider-wrap{margin-top:14px}
  .slider-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:800;color:rgba(0,0,0,.45);margin-top:6px;letter-spacing:.06em}
  body.dark .slider-labels{color:rgba(255,255,255,.5)}

  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;gap:8px}
  .iconBtn{appearance:none;border:none;background:transparent;color:rgba(0,0,0,.4);cursor:pointer;padding:6px 8px;border-radius:10px;font-weight:800;font-size:12px;letter-spacing:.08em}
  body.dark .iconBtn{color:rgba(255,255,255,.45)}
  .iconBtn:hover{background:rgba(0,0,0,.05);color:rgba(0,0,0,.7)}
  body.dark .iconBtn:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.85)}

  .ribbon{position:absolute;top:14px;right:-46px;transform:rotate(35deg);background:var(--c1);color:#fff;padding:4px 50px;font-weight:900;font-size:11px;letter-spacing:.18em;box-shadow:0 4px 12px rgba(0,0,0,.2)}

  .menu-wrap{position:relative}
  .menu-btn{display:inline-flex;align-items:center;gap:10px}
  .menu-bars{display:inline-flex;flex-direction:column;gap:3px}
  .menu-bars i{display:block;width:18px;height:2.5px;border-radius:2px;background:currentColor;transition:transform .18s, opacity .18s}
  .menu-btn.open .menu-bars i:nth-child(1){transform:translateY(5.5px) rotate(45deg)}
  .menu-btn.open .menu-bars i:nth-child(2){opacity:0}
  .menu-btn.open .menu-bars i:nth-child(3){transform:translateY(-5.5px) rotate(-45deg)}
  .menu-pop{position:absolute;top:calc(100% + 8px);right:0;min-width:220px;background:#fff;border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,.12),0 1px 3px rgba(0,0,0,.08);padding:6px;z-index:30;
    animation:menuIn .15s ease both}
  body.dark .menu-pop{background:#1f2937}
  @keyframes menuIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
  .menu-item{display:flex;align-items:center;gap:12px;width:100%;padding:11px 12px;border:none;background:transparent;
    border-radius:12px;font-family:'Nunito';font-weight:700;font-size:15px;color:inherit;cursor:pointer;text-align:left}
  .menu-item:hover{background:rgba(0,0,0,.06)}
  body.dark .menu-item:hover{background:rgba(255,255,255,.08)}
  .menu-icon{font-size:18px;width:22px;text-align:center}
  .menu-right{margin-left:auto;color:#22c55e;font-weight:900}
  .menu-sep{height:1px;background:rgba(0,0,0,.08);margin:6px 8px}
  body.dark .menu-sep{background:rgba(255,255,255,.1)}

  .leaderboard{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
    background:#1a1a2e;color:#fff;padding:9px 18px;border-radius:10px;display:flex;gap:14px;align-items:center;
    box-shadow:0 4px 12px rgba(0,0,0,.2);font-weight:700;font-size:13px;z-index:10;white-space:nowrap}
  body.dark .leaderboard{background:#f9fafb;color:#1a1a2e}
  .lb-dot{width:10px;height:10px;border-radius:50%;background:var(--c1)}
  .lb-name{margin-right:6px}

  /* edit panel */
  .edit-panel{position:fixed;top:0;right:0;bottom:0;width:272px;background:#fff;
    box-shadow:-2px 0 16px rgba(0,0,0,.08);padding:24px 20px;overflow-y:auto;z-index:40;
    display:flex;flex-direction:column;gap:20px}
  body.dark .edit-panel{background:#1f2937}
  .wrap.panel-open{padding-right:292px}
  .card-selected{outline:2px solid var(--c1);outline-offset:2px}
  .edit-section-label{font-size:11px;font-weight:700;color:#888;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:6px}
  .edit-input{width:100%;border:1.5px solid #e5e7eb;border-radius:10px;padding:8px 12px;outline:none;background:transparent;box-sizing:border-box}
  body.dark .edit-input{border-color:#374151;color:#fefaf2}
  .edit-action-btn{display:flex;align-items:center;gap:8px;width:100%;border:none;background:transparent;
    color:rgba(0,0,0,.5);cursor:pointer;padding:8px 10px;border-radius:8px;font-family:'Nunito';font-weight:700;font-size:13px;text-align:left}
  body.dark .edit-action-btn{color:rgba(255,255,255,.5)}
  .edit-action-btn:hover{background:rgba(0,0,0,.05);color:rgba(0,0,0,.8)}
  body.dark .edit-action-btn:hover{background:rgba(255,255,255,.08);color:#fff}
  .edit-action-btn.danger{color:#e11d48}
  .edit-action-btn.danger:hover{background:#fef2f2;color:#e11d48}

  /* fireworks bar */
  .top-celebration{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden}

  /* modal */
  .modal-back{position:fixed;inset:0;background:rgba(15,8,40,.5);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.15)}
  body.dark .modal{background:#1e1640;color:#fff}
  .modal h2{font-family:'Fredoka';font-size:32px;margin:0 0 8px}
  .modal p{margin:0 0 18px;color:rgba(0,0,0,.6)}
  body.dark .modal p{color:rgba(255,255,255,.7)}
  .modal .actions{display:flex;gap:10px;justify-content:center}
  .modal .actions button{font-family:'Fredoka';font-weight:600;font-size:18px;padding:12px 22px;border-radius:14px;border:none;cursor:pointer}
  .modal .cancel{background:rgba(0,0,0,.06);color:inherit}
  body.dark .modal .cancel{background:rgba(255,255,255,.08)}
  .modal .confirm{background:#c81d57;color:#fff}

  @media (max-width:560px){
    .wrap{padding:14px 12px 90px}
    .grid{gap:16px}
    .card{padding:16px 16px 14px;border-radius:24px}
    .score-big{font-size:84px}
    .emoji{font-size:32px}
    .toolbar .pill{font-size:13px;padding:8px 12px}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
